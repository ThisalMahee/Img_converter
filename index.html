<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Converter</div>
        <div class="auth-buttons">
            <a href="#" class="login-link">Login</a>
            <button class="signin-btn">Sign in</button>
        </div>
    </header>

    <main class="container">
        <div class="mode-switcher-container">
            <div class="mode-switcher" role="tablist">
                <button class="mode-btn active" data-mode="to-jpg" role="tab" aria-selected="true">To JPG</button>
                <button class="mode-btn" data-mode="to-png" role="tab" aria-selected="false">To PNG</button>
            </div>
        </div>

        <div class="dropzone" id="dropzone">
            <div class="upload-icon-container">
                <svg width="100" height="80" viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 0C4.47715 0 0 4.47715 0 10V70C0 75.5229 4.47715 80 10 80H90C95.5229 80 100 75.5229 100 70V20C100 14.4772 95.5229 10 90 10H50L40 0H10Z" fill="#C4C4C4"/>
                    <path d="M50 25L35 40H45V60H55V40H65L50 25Z" fill="white"/>
                </svg>
            </div>
            <div class="dropzone-text">Drag and drop or upload your file</div>
            <button class="upload-btn" id="browseBtn">Upload your files</button>
            <div class="format-hint" id="formatHint">Supports .jpg and .jpeg files</div>
            <div class="dropzone-error" id="errorMsg"></div>
            <input type="file" id="file-input" hidden accept=".jpg,.jpeg" multiple>
        </div>

        <div class="file-list" id="fileList">
            <!-- Selected files will be displayed here -->
        </div>

        <div class="bg-options" id="bgOptions">
            <label for="bgColor">Background color:</label>
            <input type="color" id="bgColor" class="bg-color-picker" value="#FFFFFF">
        </div>

        <div class="success-msg" id="successMsg"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Converting your image&hellip;</div>
        </div>

        <div class="action-container">
            <button class="action-btn convert-btn" id="convertBtn" disabled>Convert &rarr;</button>
            <button class="action-btn download-btn" id="downloadBtn" disabled>
                Download converted file
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
